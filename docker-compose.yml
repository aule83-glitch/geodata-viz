version: "3.9"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8001:8000"  # Mapujemy zewnętrzny 8001 na wewnętrzny 8000 uvicorna
    volumes:
      - ./backend/app:/app/app
      - ./backend/data:/app/data
    environment:
      - DATA_DIR=/app/data
      - PYTHONUNBUFFERED=1
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    volumes:
      - ./frontend/src:/app/src
    environment:
      # Wewnątrz sieci dockerowej frontend szuka backendu po nazwie serwisu
      - VITE_API_URL=http://backend:8000 
    depends_on:
      - backend
    restart: unless-stopped

networks:
  default:
    name: geodata-network